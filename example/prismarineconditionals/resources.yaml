prefix: MyAppWithPrismarine

import:
  - backend

prismarine:
  default-base: common
  access-module: common.dynamo_access
  tables:
    - package: myobject
      trigger:
        ? !Conditional
          key: function
          environment:
            - prodsam
            - stagingsam
        : itemlogger
  conditional-tables:
    ? !Conditional
      key: tables
      environment:
        - prodsam
        - stagingsam
    : - package: condition
