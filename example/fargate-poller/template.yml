AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  FargatePollerExample
Parameters:
  Stage:
    Type: String
    Default: dev
  DefaultVpcPublicSubnet1:
    Type: String
    Description: Default VPC Public Subnet 1
  DefaultVpcPublicSubnet2:
    Type: String
    Description: Default VPC Public Subnet 2
Globals:
  Function:
    Runtime: python3.13
    Handler: index.handler
    Architectures:
      - x86_64
    Timeout: 30
    Environment:
      Variables:
        ENV: !Ref Stage
        ACCOUNT_ID: !Ref AWS::AccountId
  Api:
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'*'"
      AllowMethods: "'*'"
      AllowCredentials: False
Resources:
    # end paths
  fargatepollerexampleCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "fargatepollerexample-cluster-${Stage}"
  # Streams
    # end streams 
  # Tables
  GatewayDynamoRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Action:
              - 'sts:AssumeRole'
            Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
      Policies:
        - PolicyName: APIGatewayDynamoDBPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:PutItem'
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
## Todo: provide only required resources list
                Resource: '*'
    # end tables
  # Queues
    # end queues
  # Streams
    # end streams
  # Buckets
    # end buckets
  # Queues
    # end queues
  # Tables
  FargatePollerExampleRandomStats:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub FargatePollerExampleRandomStats-${Stage}
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
        RecoveryPeriodInDays: 14
    # end tables
  # Lambda Layer
    # end lambda layer
  # Functions
    # end functions
  # Services
  fargatepollerexampleExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: [sts:AssumeRole]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
  fargatepollerexamplepollerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: [sts:AssumeRole]
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-poller-TaskRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                  - dynamodb:BatchGetItem
                Resource: !GetAtt FargatePollerExampleRandomStats.Arn
  fargatepollerexamplepollerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "fargatepollerexample-poller-${Stage}"
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt fargatepollerexampleExecutionRole.Arn
      TaskRoleArn: !GetAtt fargatepollerexamplepollerTaskRole.Arn
      ContainerDefinitions:
        - Name: poller
          Image: 
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref fargatepollerexamplepollerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: REGION
              Value: !Ref AWS::Region
            - Name: ENV
              Value: !Ref Stage
            - Name: ACCOUNT_ID
              Value: !Ref AWS::AccountId
            - Name: TABLE_NAME
              Value: FargatePollerExampleRandomStats-dev
            - Name: REGION
              Value: us-east-1
  fargatepollerexamplepollerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/fargatepollerexample-poller-${Stage}"
      RetentionInDays: 7
  fargatepollerexamplepollerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "fargatepollerexample-poller-${Stage}"
      Cluster: !Ref fargatepollerexampleCluster
      LaunchType: FARGATE
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref DefaultVpcPublicSubnet1
            - !Ref DefaultVpcPublicSubnet2
      TaskDefinition: !Ref fargatepollerexamplepollerTaskDefinition
  # DynamoDB Stream Event Source Mappings (from table definitions)
    # end stream event source mappings
  # Search
    # end search
  # MQTT (IoT Core)
    # end mqtt