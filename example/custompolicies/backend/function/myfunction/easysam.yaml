lambda:
  name: myfunction
  resources:
    buckets:
      - documents
    send:
      - notifications
    custompolicies:
      - action: logs:CreateLogGroup
        effect: allow
        resource: 'arn:aws:logs:*:*:*'
      - action:
          - logs:CreateLogStream
          - logs:PutLogEvents
        effect: allow
        resource: 'any'
  integration:
    path: /process
    open: true
    greedy: false
