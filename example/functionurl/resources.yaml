prefix: funcurl

import:
  - backend/function/local-lambda

functions:
  hello-world:
    uri: backend/function/hello-world
    functionurl: true
  hello-custom:
    uri: backend/function/hello-custom
    functionurl:
      auth_type: NONE
      cors:
        allow_origins:
          - "*"
        allow_methods:
          - GET
          - POST
