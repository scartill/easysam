prefix: funcurl

import:
  - backend/function/local-lambda

functions:
  hello-world:
    uri: backend/function/hello-world
    function_url: true
  hello-custom:
    uri: backend/function/hello-custom
    function_url:
      auth_type: NONE
      cors:
        allow_origins:
          - "*"
        allow_methods:
          - GET
          - POST
